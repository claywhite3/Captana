<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .stub-body {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 28px 0;
      text-align: center;
      animation: fadeUp .4s .08s ease both; opacity: 0;
    }
    .stub-icon {
      width: 96px; height: 96px;
      border-radius: 24px;
      background: var(--c-blue-soft);
      border: 1.5px solid var(--c-blue-line);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      color: var(--c-blue);
    }
    .stub-icon svg { width: 44px; height: 44px; }
    .stub-title {
      font-size: 22px; font-weight: 800;
      color: var(--c-ink);
      line-height: 1.25;
    }
    .stub-msg {
      margin-top: 12px;
      font-size: 14px; color: var(--c-muted);
      line-height: 1.5;
      font-weight: 500;
      max-width: 300px;
    }
  </style>
</head>
<body>
<div class="shell">

  <div class="top-bar">
    <a href="#" id="backLink" class="btn-circle" aria-label="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <a href="flow_picker.html" class="btn-home" aria-label="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="avatar" id="avatarEl">AB</div>
  </div>

  <div class="hero">
    <div class="eyebrow" data-i18n="inv_guide_eyebrow">Installation</div>
    <div class="hero-title" data-i18n="inv_guide_title">Guide d'installation</div>
  </div>

  <div class="stub-body">
    <div class="stub-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <div class="stub-title" data-i18n="inv_guide_soon_title">Bientôt disponible</div>
    <div class="stub-msg" data-i18n="inv_guide_soon_msg">Les instructions pas-à-pas pour cette étape arriveront dans une prochaine version.</div>
  </div>

  <div class="footer-stack">
    <button class="btn-primary" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;margin-right:6px;vertical-align:-3px;"><path d="M15 18l-6-6 6-6"/></svg>
      <span data-i18n="common_back">Retour</span>
    </button>
  </div>

</div>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';

  document.getElementById('backLink').addEventListener('click', function (e) {
    e.preventDefault();
    history.back();
  });
  document.getElementById('backBtn').addEventListener('click', function () {
    history.back();
  });
</script>
</body>
</html>
