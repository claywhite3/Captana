<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Vérifier les allées</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .review-grid {
      margin: 18px 20px 0;
      display: grid;
      gap: 10px;
      animation: fadeUp .4s .08s ease both; opacity: 0;
    }
    .grid-tile {
      aspect-ratio: 1;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; font-size: 26px; font-weight: 800;
      position: relative;
    }
    .grid-tile.real {
      background: var(--c-green-soft);
      border: 2px solid var(--c-green);
      color: var(--c-green);
    }
    .grid-tile.real::after {
      content: ''; position: absolute; top: 6px; right: 6px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--c-green);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>");
      background-size: 12px;
      background-repeat: no-repeat;
      background-position: center;
    }
    .grid-tile.skip {
      background: #F3F4F6;
      border: 2px dashed var(--c-line);
      color: var(--c-muted-2);
    }

    .legend {
      margin: 14px 20px 0;
      display: flex; gap: 16px;
      animation: fadeUp .4s .15s ease both; opacity: 0;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600;
      color: var(--c-muted);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 4px;
    }
    .legend-dot.green { background: var(--c-green); }
    .legend-dot.gray  { background: var(--c-muted-2); }

    .footer-stack {
      padding: 24px 20px 0;
      display: flex; flex-direction: column; gap: 10px;
      margin-top: auto;
      animation: fadeUp .4s .25s ease both; opacity: 0;
    }
  </style>
</head>
<body>
<div class="shell">

  <div class="top-bar">
    <a href="#" id="backLink" class="btn-circle" aria-label="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <a href="flow_picker.html" class="btn-home" aria-label="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="avatar" id="avatarEl">AB</div>
  </div>

  <div class="hero">
    <div class="eyebrow" id="eyebrow"></div>
    <div class="hero-title" data-i18n="mm_aisle_review_title">Vérifions les allées</div>
    <div class="hero-sub"   data-i18n="mm_aisle_review_sub">Vert = configuré. Gris = nous pensons que c'est sauté.</div>
  </div>

  <div class="review-grid" id="grid"></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot green"></span><span id="legGreen">Configuré</span></div>
    <div class="legend-item"><span class="legend-dot gray"></span><span id="legGray" data-i18n="mm_aisle_skipped">sauté</span></div>
  </div>

  <div class="footer-stack">
    <button class="btn-primary" id="okBtn" data-i18n="mm_aisle_review_ok">C'est correct, terminer la zone</button>
    <button class="btn-secondary" id="backBtn" data-i18n="mm_aisle_review_back">Retour pour modifier</button>
  </div>

</div>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';

  const params = new URLSearchParams(location.search);
  const zoneId = params.get('zone');
  if (!zoneId) window.location.href = 'mm_zone.html';

  const zone = findZone(getMap(), zoneId);
  if (!zone) window.location.href = 'mm_zone.html';

  document.getElementById('eyebrow').textContent = `${t('mm_aisle_eyebrow')} ${zone.name}`;
  document.getElementById('legGreen').textContent = (getLang() === 'fr') ? 'Configurée' : 'Set up';
  document.getElementById('backLink').href = `mm_aisle.html?zone=${zoneId}`;

  // Build grid showing every aisle from 1..max(real)
  // (real aisles green, inferred skipped ones gray)
  const realNumbers = zone.aisles.filter(a => !a.skipped).map(a => a.number);
  const maxNum = realNumbers.length ? Math.max(...realNumbers) : 0;
  const minNum = realNumbers.length ? Math.min(...realNumbers) : 1;
  const start  = Math.min(1, minNum); // start from 1 for clarity
  const end    = maxNum;

  const grid = document.getElementById('grid');
  // Choose grid columns based on count
  const total = end - start + 1;
  const cols = total <= 4 ? 2 : (total <= 9 ? 3 : 4);
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  for (let n = start; n <= end; n++) {
    const a = zone.aisles.find(x => x.number === n);
    const isReal = a && !a.skipped;
    const tile = document.createElement('div');
    tile.className = 'grid-tile ' + (isReal ? 'real' : 'skip');
    tile.textContent = n;
    grid.appendChild(tile);
  }

  document.getElementById('okBtn').addEventListener('click', () => {
    setZoneCompleted(zoneId, true);
    showToast({
      icon: 'success',
      title: t('mm_toast_zone_done'),
      message: t('mm_toast_zone_done_msg'),
      autoHide: 1600,
    });
    setTimeout(() => { window.location.href = 'mm_zone.html'; }, 700);
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = `mm_aisle.html?zone=${zoneId}`;
  });
</script>
</body>
</html>
