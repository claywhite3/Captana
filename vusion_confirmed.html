<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Confirmé</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .shell { padding-bottom: 24px; }

    .confirm-wrap {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 28px 0;
      text-align: center;
    }

    .check-burst {
      position: relative;
      width: 128px; height: 128px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      animation: pop .55s cubic-bezier(.2,.8,.2,1.2) both;
    }
    .check-burst::before {
      content:''; position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(22,163,74,.20) 0%, rgba(22,163,74,0) 70%);
    }
    .check-disc {
      width: 88px; height: 88px;
      background: var(--c-green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 32px rgba(22,163,74,.30);
    }
    .check-disc svg { width: 44px; height: 44px; color: #fff; stroke-dasharray: 60; stroke-dashoffset: 60; animation: draw .55s .25s ease forwards; }

    .confirm-title {
      font-size: 26px; font-weight: 800;
      color: var(--c-ink);
      line-height: 1.2;
      animation: fadeUp .4s .15s ease both; opacity: 0;
    }
    .confirm-msg {
      margin-top: 14px;
      font-size: 15px; color: var(--c-muted);
      line-height: 1.5; max-width: 320px;
      font-weight: 500;
      animation: fadeUp .4s .25s ease both; opacity: 0;
    }

    .meta-row {
      margin-top: 28px;
      display: flex; align-items: center; gap: 8px;
      background: var(--c-green-soft);
      border: 1.5px solid var(--c-green-line);
      border-radius: 999px;
      padding: 8px 14px;
      animation: fadeUp .4s .35s ease both; opacity: 0;
    }
    .meta-row svg { width: 14px; height: 14px; color: var(--c-green); }
    .meta-row span { font-size: 12px; font-weight: 700; color: var(--c-green); letter-spacing: .2px; }

    .footer-stack {
      padding: 0 20px;
      display: flex; flex-direction: column; gap: 12px;
      animation: fadeUp .4s .45s ease both; opacity: 0;
    }

    @keyframes pop {
      0%   { transform: scale(.4); opacity: 0; }
      60%  { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body>
<div class="shell">

  <div class="top-bar">
    <span style="width:38px;"></span>
    <a href="flow_picker.html" class="btn-home" aria-label="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="avatar" id="avatarEl">AB</div>
  </div>

  <div class="confirm-wrap">
    <div class="check-burst">
      <div class="check-disc">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>

    <div class="confirm-title" data-i18n="confirmed_title">Parfait, vous êtes prêt</div>
    <div class="confirm-msg"   data-i18n="confirmed_msg">Merci d'utiliser des étiquettes Vusion ESL. Aucune cartographie supplémentaire n'est nécessaire — vous pouvez commencer l'installation.</div>

    <div class="meta-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i18n="flow_mapping_done">Cartographie terminée</span>
    </div>
  </div>

  <div class="footer-stack">
    <a href="flow_picker.html" class="btn-primary" style="text-align:center; text-decoration:none; display:block;" data-i18n="confirmed_btn">Retour au menu</a>
  </div>

</div>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';

  // Make sure mapping status is set in case someone deep-links here
  if (getMappingStatus() === 'none') setMappingStatus('vusion');
</script>
</body>
</html>
