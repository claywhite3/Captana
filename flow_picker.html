<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Flux</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .store-pill {
      display: flex; align-items: center; gap: 8px;
      background: #fff;
      border: 1.5px solid var(--c-line);
      border-radius: 12px;
      padding: 7px 12px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .15s;
      max-width: 200px;
    }
    .store-pill:active { border-color: var(--c-blue); }
    .store-pill svg { width: 13px; height: 13px; color: var(--c-muted); flex-shrink: 0; }
    .store-pill-name {
      font-size: 12px; font-weight: 700;
      color: var(--c-ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 140px;
    }
    .store-pill-change {
      font-size: 10px; color: var(--c-muted-2);
      font-weight: 500;
    }

    .instructions-btn {
      width: 38px; height: 38px;
      background: var(--c-blue-soft);
      border: 1.5px solid var(--c-blue-line);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: transform .15s, background .15s;
      cursor: pointer;
    }
    .instructions-btn:active { transform: scale(.93); background: #DBEAFE; }
    .instructions-btn svg { width: 18px; height: 18px; color: var(--c-blue); }
  </style>
</head>
<body>
<div class="shell">

  <div class="top-bar">
    <div class="avatar" id="avatarEl">AB</div>
    <button class="instructions-btn" type="button" aria-label="instructions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </button>
    <a href="location.html" class="store-pill" id="storePill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <div>
        <div class="store-pill-name" id="storeName">Carrefour</div>
        <div class="store-pill-change" data-i18n="flow_change_store">changer</div>
      </div>
    </a>
  </div>

  <div class="hero">
    <div class="hero-title" data-i18n="flow_title">Captana</div>
    <div class="hero-sub"   data-i18n="flow_sub">Sélectionnez un flux pour commencer</div>
  </div>

  <div class="section-header" data-i18n="flow_section_install">Installation & cartographie</div>
  <div class="card-list stagger" id="installList"></div>

  <div class="section-header" data-i18n="flow_section_ops">Opérations en magasin</div>
  <div class="card-list stagger" id="opsList"></div>

</div>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';
  document.getElementById('storeName').textContent = sessionStorage.getItem('storeName') || 'Carrefour';

  /* SVG icon library */
  const ICONS = {
    mapping: '<path d="M9 4l-7 3v13l7-3 6 3 7-3V4l-7 3z"/><line x1="9" y1="4" x2="9" y2="17"/><line x1="15" y1="7" x2="15" y2="20"/>',
    install: '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',
    lock:    '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16.5" r="1.5"/>',
    valid:   '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
    maint:   '<path d="M14.7 6.3a4 4 0 0 0-5.4 5.4l-7 7 2.3 2.3 7-7a4 4 0 0 0 5.4-5.4l-2.5 2.5-2.3-2.3z"/>',
    director:'<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>',
    section: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
    assoc:   '<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
    check:   '<polyline points="20 6 9 17 4 12"/>',
  };

  function makeIconSVG(d) {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
  }

  function makeArrow() {
    return '<div class="card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>';
  }
  function makeCheck() {
    return '<div class="card-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">' + ICONS.check + '</svg></div>';
  }

  /* Build a card row */
  function buildCard({ icon, iconColor, titleKey, descKey, descOverride, href, state }) {
    // state: 'active' | 'done' | 'locked'
    const classes = ['card-row'];
    if (state === 'done')   classes.push('is-done');
    if (state === 'locked') classes.push('is-disabled');

    const tag = (state === 'locked') ? 'button' : 'a';
    const el  = document.createElement(tag);
    el.className = classes.join(' ');
    if (tag === 'a') el.href = href;
    if (tag === 'button') el.type = 'button';

    const trail = state === 'done' ? makeCheck() : makeArrow();
    const desc  = descOverride || t(descKey);

    el.innerHTML = `
      <div class="card-icon ${iconColor}">${makeIconSVG(ICONS[icon])}</div>
      <div class="card-body">
        <div class="card-title">${t(titleKey)}</div>
        <div class="card-sub">${desc}</div>
      </div>
      ${trail}
    `;
    return el;
  }

  /* State-aware install/mapping logic */
  function refresh() {
    const installList = document.getElementById('installList');
    const opsList     = document.getElementById('opsList');
    installList.innerHTML = '';
    opsList.innerHTML     = '';

    const status = getMappingStatus();
    // 'none'   -> Mapping=active, Install=locked
    // 'vusion' -> Mapping=done,   Install=active (Vusion path)
    // 'manual' -> Mapping=done,   Install=active (manual path)

    // When mapping is complete, the Mapping card opens the review screen
    // (manual) or just bounces back to tag chooser (vusion -> nothing to edit).
    let mappingHref;
    if (status === 'none')        mappingHref = 'tag_chooser.html';
    else if (status === 'manual') mappingHref = 'mm_review.html';
    else                          mappingHref = 'tag_chooser.html';

    const mapping = buildCard({
      icon: 'mapping', iconColor: 'purple',
      titleKey: 'flow_mapping',
      descKey:  status === 'none' ? 'flow_mapping_desc' : 'flow_mapping_done',
      href: mappingHref,
      state: status === 'none' ? 'active' : 'done',
    });
    installList.appendChild(mapping);

    const installState = status === 'none' ? 'locked' : 'active';
    const installHref  = status === 'vusion' ? 'install_vusion_intro.html' : 'install_manual_zone.html';
    const installDesc  = installState === 'locked'
      ? t('flow_install_locked')
      : t('flow_install_desc');

    const install = buildCard({
      icon: installState === 'locked' ? 'lock' : 'install',
      iconColor: installState === 'locked' ? 'gray' : 'blue',
      titleKey: 'flow_install',
      descOverride: installDesc,
      href: installHref,
      state: installState,
    });
    if (installState === 'locked') {
      install.addEventListener('click', () => {
        showToast({
          icon: 'warn',
          title: t('flow_install'),
          message: t('flow_install_locked'),
          autoHide: 4000,
        });
      });
    }
    installList.appendChild(install);

    /* Ops cards */
    opsList.appendChild(buildCard({
      icon:'valid',    iconColor:'green',  titleKey:'flow_validation',  descKey:'flow_validation_desc',  href:'role_stub.html?role=validation', state:'active'
    }));
    const maintCard = buildCard({
      icon:'maint',    iconColor:'amber',  titleKey:'flow_maintenance', descKey:'flow_maintenance_desc', href:'maintenance.html', state:'active'
    });
    /* When user enters maintenance from flow picker, mark a fresh demo session
       so the page reseeds with consistent issues each visit. */
    maintCard.addEventListener('click', function () {
      sessionStorage.setItem('maintenanceFreshDemo', '1');
    });
    opsList.appendChild(maintCard);
    opsList.appendChild(buildCard({
      icon:'director', iconColor:'blue',   titleKey:'flow_director',    descKey:'flow_director_desc',    href:'role_stub.html?role=director', state:'active'
    }));
    opsList.appendChild(buildCard({
      icon:'section',  iconColor:'purple', titleKey:'flow_section_mgr', descKey:'flow_section_mgr_desc', href:'role_stub.html?role=section_mgr', state:'active'
    }));
    opsList.appendChild(buildCard({
      icon:'assoc',    iconColor:'green',  titleKey:'flow_associate',   descKey:'flow_associate_desc',   href:'role_stub.html?role=associate', state:'active'
    }));
  }

  refresh();
</script>
</body>
</html>
