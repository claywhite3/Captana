<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Batterie</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .status-card {
      margin: 14px 20px 0;
      background: var(--c-green-soft);
      border: 1.5px solid var(--c-green-line);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow-sm);
      animation: fadeUp .4s .04s ease both; opacity: 0;
    }
    .status-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(22,163,74,.18);
      color: var(--c-green);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .status-icon svg { width: 22px; height: 22px; }
    .status-text { flex: 1; min-width: 0; }
    .status-label {
      font-size: 10px; font-weight: 700;
      color: var(--c-green);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .status-value {
      font-size: 15px; font-weight: 700;
      color: var(--c-ink);
      margin-top: 2px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: 1px;
    }

    .graphic-card {
      margin: 16px 20px 0;
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      animation: fadeUp .4s .12s ease both; opacity: 0;
    }
    .graphic-slot {
      width: 100%;
      min-height: 260px;
      position: relative;
      display: block;
    }
    .graphic-slot .img-fallback-wrap { position: relative; min-height: 260px; }
    .graphic-slot .img-fallback-card  { border-radius: 0; min-height: 260px; }

    /* Step 1 of the battery troubleshooting flow uses the "remove" CTA. Amber so it
       reads as "do this first / a removal action" rather than the green confirm-progress
       button used on the insert page. */
    .btn-remove {
      width: 100%;
      padding: 16px;
      background: var(--c-amber);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(245,158,11,.30);
      transition: transform .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-remove:active { transform: scale(.975); }
    .btn-remove svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
<div class="shell">

  <div class="top-bar">
    <a href="maintenance.html" class="btn-circle" aria-label="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <a href="flow_picker.html" class="btn-home" aria-label="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="avatar" id="avatarEl">AB</div>
  </div>

  <div class="hero">
    <div class="eyebrow" data-i18n="mbr_eyebrow">Dépannage batterie</div>
    <div class="hero-title" data-i18n="mbr_title">Retirez la batterie déchargée</div>
    <div class="hero-sub"   data-i18n="mbr_sub">Ouvrez le compartiment et retirez la batterie usagée. Vous allez ensuite installer une batterie neuve.</div>
  </div>

  <div class="status-card">
    <div class="status-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div class="status-text">
      <div class="status-label" data-i18n="mbr_loc_label">Emplacement</div>
      <div class="status-value" id="locationValue">A · 4 · 5</div>
    </div>
  </div>

  <div class="graphic-card">
    <div class="graphic-slot" data-src="battery-insert.png" data-alt="Battery compartment guide"></div>
  </div>

  <div class="footer-stack">
    <button class="btn-remove" id="removedBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i18n="mbr_confirm">Batterie retirée</span>
    </button>
  </div>

</div>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';
  mountImageSlots();

  /* Display location from the active troubleshoot context (maintenance or validation). */
  (function () {
    var ctx = (typeof getActiveTroubleshootContext === 'function') ? getActiveTroubleshootContext() : null;
    var m = (typeof getMap === 'function') ? getMap() : null;
    var locText = '—';
    if (ctx && m) {
      var z = (m.zones || []).find(function (x) { return x.id === ctx.zoneId; });
      if (z) {
        var a = (z.aisles || []).find(function (x) { return x.id === ctx.aisleId; });
        if (a) {
          var s = (a.sections || []).find(function (x) { return x.id === ctx.sectionId; });
          if (s) locText = z.name + ' · ' + a.number + ' · ' + s.number;
        }
      }
    }
    document.getElementById('locationValue').textContent = locText;

    /* Back-button goes to whichever flow brought us here */
    if (ctx && ctx.__source === 'validation') {
      var bb = document.querySelector('a.btn-circle[href="maintenance.html"]');
      if (bb) bb.setAttribute('href', 'validation.html');
    }
  })();

  /* "Battery removed" → page 2 (install_v_battery.html). The maintenanceContext is
     untouched so install_v_battery picks it up and shows the completion modal at the end. */
  document.getElementById('removedBtn').addEventListener('click', function () {
    window.location.href = 'install_v_battery.html';
  });
</script>
</body>
</html>
