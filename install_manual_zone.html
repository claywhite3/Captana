<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Installer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .picker-list {
      margin: 16px 20px 0;
      display: flex; flex-direction: column;
      gap: 10px;
    }
    .picker-card {
      background: #fff; border: none; border-radius: 14px;
      padding: 16px; box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; text-align: left;
      font-family: inherit;
      animation: fadeUp .35s ease both; opacity: 0;
      transition: transform .12s, box-shadow .15s;
    }
    .picker-card:active { transform: scale(.98); }
    .picker-tile {
      width: 44px; height: 44px;
      border-radius: 11px;
      background: var(--c-blue-soft);
      color: var(--c-blue);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 16px; font-weight: 800; letter-spacing: .5px;
    }
    .picker-body { flex: 1; min-width: 0; }
    .picker-title {
      font-size: 15px; font-weight: 800;
      color: var(--c-ink); line-height: 1.3;
    }
    .picker-sub {
      font-size: 13px; color: var(--c-muted);
      font-weight: 500; line-height: 1.4;
      margin-top: 2px;
    }
    .picker-pill {
      background: #DCFCE7;
      border: 1px solid #86EFAC;
      color: #15803D;
      font-size: 10px; font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      display: inline-flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .picker-pill svg { width: 11px; height: 11px; }
    .picker-chev { color: var(--c-muted-2); flex-shrink: 0; }
    .picker-chev svg { width: 16px; height: 16px; }
    .picker-card:nth-child(1) { animation-delay: .04s; }
    .picker-card:nth-child(2) { animation-delay: .08s; }
    .picker-card:nth-child(3) { animation-delay: .12s; }
    .picker-card:nth-child(4) { animation-delay: .16s; }
    .picker-card:nth-child(5) { animation-delay: .20s; }
    .picker-card:nth-child(6) { animation-delay: .24s; }

    .empty-state {
      margin: 24px 20px 0;
      padding: 28px 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .empty-state-icon {
      width: 56px; height: 56px;
      margin: 0 auto 14px;
      border-radius: 14px;
      background: var(--c-blue-soft);
      color: var(--c-blue);
      display: flex; align-items: center; justify-content: center;
    }
    .empty-state-icon svg { width: 28px; height: 28px; }
    .empty-state-title {
      font-size: 16px; font-weight: 800;
      color: var(--c-ink);
    }
    .empty-state-msg {
      font-size: 13px; color: var(--c-muted);
      font-weight: 500; line-height: 1.5;
      margin-top: 6px;
    }
  </style>
</head>
<body>
<div class="shell">

  <div class="top-bar">
    <a href="flow_picker.html" class="btn-circle" aria-label="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <a href="flow_picker.html" class="btn-home" aria-label="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="avatar" id="avatarEl">AB</div>
  </div>

  <div class="hero">
    <div class="eyebrow" data-i18n="im_eyebrow">Installer une caméra</div>
    <div class="hero-title" data-i18n="im_zone_title">Choisissez une zone</div>
    <div class="hero-sub"   data-i18n="im_zone_sub">Sélectionnez la zone du magasin où vous installez la caméra.</div>
  </div>

  <div class="picker-list" id="zoneList"></div>
  <div id="emptyState" style="display:none;"></div>

</div>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';

  /* Mark this install as a manual flow so downstream pages route correctly. */
  sessionStorage.setItem('installMode', 'manual');

  /* Clear any in-progress install state from a prior loop. */
  ['vusionInstallTagId','vusionInstallZone','vusionInstallAisle','vusionInstallSection',
   'vusionTargetTagId','vusionTargetZone','vusionTargetAisle','vusionTargetSection',
   'vusionCameraId','manualSectionId','manualAisleId','manualZoneId']
    .forEach(k => sessionStorage.removeItem(k));

  function chevronSVG() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
  }
  function checkSVG() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  }

  function renderZones() {
    const list = document.getElementById('zoneList');
    const empty = document.getElementById('emptyState');
    const m = getMap();

    list.innerHTML = '';
    if (!m.zones || m.zones.length === 0) {
      list.style.display = 'none';
      empty.style.display = 'block';
      empty.className = 'empty-state';
      empty.innerHTML =
        '<div class="empty-state-icon">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>' +
        '</div>' +
        '<div class="empty-state-title">' + (getLang() === 'fr' ? 'Aucune zone cartographiée' : 'No zones mapped yet') + '</div>' +
        '<div class="empty-state-msg">' + (getLang() === 'fr' ? "Cartographiez d'abord vos zones, puis revenez installer les caméras." : 'Map your zones first, then come back to install cameras.') + '</div>';
      return;
    }

    list.style.display = 'flex';
    empty.style.display = 'none';

    m.zones.forEach(z => {
      const stats = zoneInstallStats(z.id);
      const isComplete = stats.total > 0 && stats.installed === stats.total;
      const card = document.createElement('button');
      card.className = 'picker-card';
      card.type = 'button';

      let badgeHtml = '';
      if (isComplete) {
        badgeHtml = '<span class="picker-pill">' + checkSVG() + '<span>' + t('im_complete') + '</span></span>';
      }

      const subText = stats.installed + ' ' + t('im_of') + ' ' + stats.total + ' ' + t('im_installed');

      card.innerHTML =
        '<div class="picker-tile">' + (z.name || '?') + '</div>' +
        '<div class="picker-body">' +
          '<div class="picker-title">' + t('im_zone') + ' ' + (z.name || '') + '</div>' +
          '<div class="picker-sub">' + subText + '</div>' +
        '</div>' +
        badgeHtml +
        '<span class="picker-chev">' + chevronSVG() + '</span>';

      card.addEventListener('click', () => {
        sessionStorage.setItem('manualZoneId', z.id);
        window.location.href = 'install_manual_aisle.html';
      });

      list.appendChild(card);
    });
  }

  renderZones();
</script>
</body>
</html>
