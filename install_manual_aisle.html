<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Installer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .crumb-chips {
      margin: 14px 20px 0;
      display: flex; gap: 8px;
    }
    .crumb-chip {
      flex: 1;
      background: var(--c-blue-soft);
      border: 1.5px solid #BFDBFE;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      font-family: inherit;
      transition: transform .12s, box-shadow .15s;
    }
    .crumb-chip:active { transform: scale(.98); }
    .crumb-chip-label {
      display: flex; align-items: center; gap: 8px;
    }
    .crumb-chip-label svg { width: 14px; height: 14px; color: var(--c-blue); }
    .crumb-chip-label span {
      font-size: 11px; font-weight: 700;
      color: var(--c-blue);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .crumb-chip-value {
      font-size: 16px; font-weight: 800;
      color: var(--c-ink);
      letter-spacing: .5px;
    }

    .picker-list {
      margin: 16px 20px 0;
      display: flex; flex-direction: column; gap: 10px;
    }
    .picker-card {
      background: #fff; border: none; border-radius: 14px;
      padding: 16px; box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; text-align: left;
      font-family: inherit;
      animation: fadeUp .35s ease both; opacity: 0;
      transition: transform .12s;
    }
    .picker-card:active { transform: scale(.98); }
    .picker-tile {
      width: 44px; height: 44px;
      border-radius: 11px;
      background: var(--c-blue-soft);
      color: var(--c-blue);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 18px; font-weight: 800;
    }
    .picker-body { flex: 1; min-width: 0; }
    .picker-title {
      font-size: 15px; font-weight: 800;
      color: var(--c-ink); line-height: 1.3;
    }
    .picker-sub {
      font-size: 13px; color: var(--c-muted);
      font-weight: 500; line-height: 1.4;
      margin-top: 2px;
    }
    .picker-pill {
      background: #DCFCE7;
      border: 1px solid #86EFAC;
      color: #15803D;
      font-size: 10px; font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      display: inline-flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .picker-pill svg { width: 11px; height: 11px; }
    .picker-chev { color: var(--c-muted-2); flex-shrink: 0; }
    .picker-chev svg { width: 16px; height: 16px; }
    .picker-card:nth-child(n) { animation-delay: calc(0.04s * var(--i, 0)); }
  </style>
</head>
<body>
<div class="shell">

  <div class="top-bar">
    <a href="install_manual_zone.html" class="btn-circle" aria-label="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <a href="flow_picker.html" class="btn-home" aria-label="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="avatar" id="avatarEl">AB</div>
  </div>

  <div class="hero">
    <div class="eyebrow" data-i18n="im_eyebrow">Installer une caméra</div>
    <div class="hero-title" data-i18n="im_aisle_title">Choisissez une allée</div>
    <div class="hero-sub"   data-i18n="im_aisle_sub">Sélectionnez l'allée de cette zone où va la caméra.</div>
  </div>

  <div class="crumb-chips">
    <button class="crumb-chip" id="zoneChip" type="button" onclick="window.location.href='install_manual_zone.html'">
      <span class="crumb-chip-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        <span data-i18n="im_zone">Zone</span>
      </span>
      <span class="crumb-chip-value" id="zoneCrumbName"></span>
    </button>
    <div style="flex: 1;"></div>
  </div>

  <div class="picker-list" id="aisleList"></div>

</div>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';

  /* Pull the zone id stashed by install_manual_zone */
  const zoneId = sessionStorage.getItem('manualZoneId');
  if (!zoneId) {
    /* Defensive: if someone landed here without picking a zone, send them back. */
    window.location.replace('install_manual_zone.html');
  }

  const m = getMap();
  const zone = (m.zones || []).find(z => z.id === zoneId);
  if (!zone) {
    window.location.replace('install_manual_zone.html');
  }

  document.getElementById('zoneCrumbName').textContent = zone ? zone.name : '';

  function chevronSVG() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
  }
  function checkSVG() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  }

  function renderAisles() {
    const list = document.getElementById('aisleList');
    list.innerHTML = '';
    if (!zone) return;

    const aisles = (zone.aisles || []).filter(a => !a.skipped);
    aisles.forEach((a, i) => {
      const stats = aisleInstallStats(zone.id, a.id);
      const isComplete = stats.total > 0 && stats.installed === stats.total;
      const card = document.createElement('button');
      card.className = 'picker-card';
      card.type = 'button';
      card.style.setProperty('--i', i);

      let badgeHtml = '';
      if (isComplete) {
        badgeHtml = '<span class="picker-pill">' + checkSVG() + '<span>' + t('im_complete') + '</span></span>';
      }

      const subText = stats.installed + ' ' + t('im_of') + ' ' + stats.total + ' ' + t('im_installed');

      card.innerHTML =
        '<div class="picker-tile">' + a.number + '</div>' +
        '<div class="picker-body">' +
          '<div class="picker-title">' + t('im_aisle') + ' ' + a.number + '</div>' +
          '<div class="picker-sub">' + subText + '</div>' +
        '</div>' +
        badgeHtml +
        '<span class="picker-chev">' + chevronSVG() + '</span>';

      card.addEventListener('click', () => {
        sessionStorage.setItem('manualAisleId', a.id);
        window.location.href = 'install_manual_section.html';
      });

      list.appendChild(card);
    });
  }

  renderAisles();
</script>
</body>
</html>
