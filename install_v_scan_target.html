<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Étiquette cible</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .status-stack { margin: 14px 20px 0; display: flex; flex-direction: column; gap: 8px; animation: fadeUp .4s .04s ease both; opacity: 0; }
    .status-row {
      border-radius: 14px;
      padding: 11px 14px;
      display: flex; align-items: center; gap: 10px;
      transition: background .3s, border-color .3s;
    }
    .status-row.is-confirmed { background: var(--c-green-soft); border: 1.5px solid var(--c-green-line); }
    .status-row.is-pending   { background: #fff; border: 1.5px dashed var(--c-line); }
    .status-icon-sm {
      width: 36px; height: 36px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .status-row.is-confirmed .status-icon-sm { background: rgba(22,163,74,.18); color: var(--c-green); }
    .status-row.is-pending   .status-icon-sm { background: #F3F4F6; color: var(--c-muted-2); }
    .status-icon-sm svg { width: 18px; height: 18px; }
    .status-row-text { flex: 1; min-width: 0; }
    .status-row-label {
      font-size: 9.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .status-row.is-confirmed .status-row-label { color: var(--c-green); }
    .status-row.is-pending   .status-row-label { color: var(--c-muted-2); }
    .status-row-value {
      font-size: 14px; font-weight: 700;
      margin-top: 1px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: 1px;
    }
    .status-row.is-confirmed .status-row-value { color: var(--c-ink); }
    .status-row.is-pending   .status-row-value { color: var(--c-muted-2); }
    .status-row-badge {
      font-size: 10px; font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      transition: all .3s;
    }
    .status-row.is-pending .status-row-badge { color: var(--c-muted-2); background: #F3F4F6; }
    .status-row.is-target-found .status-row-badge { color: var(--c-green); background: #DCFCE7; }
    .status-row.is-target-found { background: var(--c-green-soft); border: 1.5px solid var(--c-green-line); }
    .status-row.is-target-found .status-icon-sm { background: rgba(22,163,74,.18); color: var(--c-green); }
    .status-row.is-target-found .status-row-label { color: var(--c-green); }
    .status-row.is-target-found .status-row-value { color: var(--c-ink); }

    .scanner-card {
      margin: 14px 20px 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      position: relative;
      background: #000;
      animation: fadeUp .4s .12s ease both; opacity: 0;
      height: 220px;
    }
    .scanner-card .img-fallback-wrap { position: absolute; inset: 0; }
    .scanner-card img.img-fallback-img { width: 100%; height: 100%; object-fit: cover; }
    .scanner-card .img-fallback-card { border-radius: 0; }
    .scanner-img-slot { position: absolute; inset: 0; transition: opacity .25s ease; }
    .scanner-img-slot.hidden { opacity: 0; pointer-events: none; }
    .scanner-corners { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
    .scanner-corners::before, .scanner-corners::after,
    .scanner-card::before, .scanner-card::after {
      content: ''; position: absolute; width: 28px; height: 28px; z-index: 5;
    }
    .scanner-card::before { top: 12px; left: 12px;     border-top: 3px solid var(--c-blue);    border-left: 3px solid var(--c-blue);    border-radius: 4px 0 0 0; }
    .scanner-card::after  { bottom: 12px; right: 12px; border-bottom: 3px solid var(--c-blue); border-right: 3px solid var(--c-blue); border-radius: 0 0 4px 0; }
    .scanner-corners::before { top: 12px; right: 12px; border-top: 3px solid var(--c-blue); border-right: 3px solid var(--c-blue); border-radius: 0 4px 0 0; }
    .scanner-corners::after  { bottom: 12px; left: 12px; border-bottom: 3px solid var(--c-blue); border-left: 3px solid var(--c-blue); border-radius: 0 0 0 4px; }
    .laser-line {
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--c-red) 20%, var(--c-red) 80%, transparent 100%);
      position: absolute; top: 0;
      z-index: 10;
      animation: scan 2s infinite linear;
      box-shadow: 0 0 8px rgba(239,68,68,0.8);
      display: none;
    }
    @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }
    .complete-ui {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      background: #fff;
      border: 3px solid var(--c-green);
      border-radius: 18px;
      position: absolute; top: 0; left: 0; z-index: 20;
      gap: 10px;
      cursor: pointer;
      transition: background .15s;
    }
    .complete-ui:active { background: var(--c-green-soft); }
    .complete-check {
      width: 64px; height: 64px;
      background: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid var(--c-green);
    }
    .complete-check svg { width: 32px; height: 32px; color: var(--c-green); }
    .complete-label { font-size: 15px; font-weight: 700; color: var(--c-green); letter-spacing: .5px; }
    .complete-tap-hint { font-size: 12px; color: var(--c-muted-2); font-weight: 500; }
    @keyframes bounce { 0%,100% { transform: scale(1); } 30% { transform: scale(1.2); } 60% { transform: scale(0.92); } 80% { transform: scale(1.06); } }
    .bounce-trigger { animation: bounce .55s ease; }

    .scanner-sub { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 0; }
    .btn-text-link {
      background: none; border: none;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
      padding: 4px 0;
    }
    .btn-text-link.escape-warn { color: #B45309; }
    .btn-text-link.escape-quiet { color: var(--c-muted); }

    .hint-card {
      margin: 14px 20px 0;
      background: #fff; border-radius: 18px; overflow: hidden;
      box-shadow: var(--shadow-sm);
      animation: fadeUp .4s .22s ease both; opacity: 0;
    }
    .hint-illu { width: 100%; height: auto; display: block; background: var(--c-blue-soft); }
    .hint-caption {
      padding: 12px 16px 14px;
      font-size: 13px; color: var(--c-muted);
      font-weight: 500; text-align: center; line-height: 1.4;
    }
  </style>
</head>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';
  mountImageSlots();

  (function () {
    var z = sessionStorage.getItem('vusionInstallZone')    || 'A';
    var a = sessionStorage.getItem('vusionInstallAisle')   || '4';
    var s = sessionStorage.getItem('vusionInstallSection') || '5';
    document.getElementById('installValue').textContent = z + ' · ' + a + ' · ' + s;
  })();

  /* Toast on arrival narrating the physical reorientation.
     Sequence is intentionally sequential, not overlapping:
       0.35s — toast appears
       4.35s — toast auto-hides (4s duration above)
       4.85s — small beat for the eye to settle on the scanner
       4.85s — scan sequence starts (blurry → 1.4s → focused + laser → 1.8s → done)
     Total to scan completion: ~8 s */
  var TOAST_DELAY = 350;
  var TOAST_LIFE  = 4000;
  var POST_TOAST_BEAT = 500;
  var SCAN_START = TOAST_DELAY + TOAST_LIFE + POST_TOAST_BEAT;

  setTimeout(function () {
    showToast({
      icon: 'info',
      title:   t('inv_tscan_toast_title'),
      message: t('inv_tscan_toast_msg'),
      autoHide: TOAST_LIFE,
    });
  }, TOAST_DELAY);

  var blurrySlot  = document.getElementById('blurrySlot');
  var focusedSlot = document.getElementById('focusedSlot');
  var laser       = document.getElementById('laser');
  var complete    = document.getElementById('completeScreen');
  var targetRow   = document.getElementById('targetRow');
  var targetValue = document.getElementById('targetValue');
  var targetBadge = document.getElementById('targetBadge');
  var checkEl     = document.getElementById('completeCheck');

  var phase1Timer = null, phase2Timer = null;

  function startSequence() {
    blurrySlot.classList.remove('hidden');
    focusedSlot.classList.add('hidden');
    laser.style.display = 'none';
    complete.style.display = 'none';
    targetRow.classList.remove('is-target-found');
    targetRow.classList.add('is-pending');
    targetValue.textContent = t('inv_tscan_target_pending');
    targetBadge.textContent = t('inv_tscan_target_badge');

    clearTimeout(phase1Timer);
    clearTimeout(phase2Timer);

    phase1Timer = setTimeout(function () {
      blurrySlot.classList.add('hidden');
      focusedSlot.classList.remove('hidden');
      laser.style.display = 'block';
      phase2Timer = setTimeout(completeScan, 1800);
    }, 1400);
  }

  function completeScan() {
    playScanBeep();
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

    laser.style.display = 'none';
    complete.style.display = 'flex';

    /* Decoded target — the partner shelf across the way.
       In production the backend resolves the tag id → location.
       For the demo, we generate a plausible neighboring location. */
    var installAisle  = parseInt(sessionStorage.getItem('vusionInstallAisle')   || '4', 10);
    var installSection = parseInt(sessionStorage.getItem('vusionInstallSection') || '5', 10);
    var targetAisle  = installAisle + 1;
    var targetSection = installSection;
    var zoneLetter = sessionStorage.getItem('vusionInstallZone') || 'A';
    var tagId = zoneLetter + targetAisle + targetSection + '-' + Math.random().toString(36).slice(2,7).toUpperCase();

    sessionStorage.setItem('vusionTargetTagId',   tagId);
    sessionStorage.setItem('vusionTargetZone',    zoneLetter);
    sessionStorage.setItem('vusionTargetAisle',   String(targetAisle));
    sessionStorage.setItem('vusionTargetSection', String(targetSection));

    targetRow.classList.remove('is-pending');
    targetRow.classList.add('is-target-found');
    targetValue.textContent = zoneLetter + ' · ' + targetAisle + ' · ' + targetSection;
    targetBadge.textContent = t('inv_tscan_target_scanned');

    setTimeout(function () {
      checkEl.classList.add('bounce-trigger');
      setTimeout(function () { checkEl.classList.remove('bounce-trigger'); }, 550);
    }, 200);

    /* Surface the explicit Continue button now that the target has been captured. */
    document.getElementById('continueWrap').style.display = '';
  }

  function goNext() { window.location.href = 'install_v_capture.html'; }

  complete.addEventListener('click', goNext);
  document.getElementById('continueBtn').addEventListener('click', goNext);

  /* No target shelf — narrate, route back to install scan */
  document.getElementById('noTargetBtn').addEventListener('click', function () {
    clearTimeout(phase1Timer);
    clearTimeout(phase2Timer);
    showToast({
      icon: 'warn',
      title:   t('inv_tscan_no_target_toast_title'),
      message: t('inv_tscan_no_target_toast_msg'),
      autoHide: 0,
    });
    setTimeout(function () { window.location.href = 'install_v_scan.html'; }, 2400);
  });

  /* Manual entry — for the demo, fast-path forward with the same fake decoding */
  document.getElementById('manualBtn').addEventListener('click', function () {
    clearTimeout(phase1Timer);
    clearTimeout(phase2Timer);
    completeScan();
  });

  /* Wait until after the toast clears before kicking off the scan */
  setTimeout(startSequence, SCAN_START);
</script>
</body>
</html>
