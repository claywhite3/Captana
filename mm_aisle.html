<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Allées</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .add-block {
      margin: 16px 20px 0;
      background: #fff;
      border-radius: 22px;
      padding: 22px 20px 20px;
      box-shadow: var(--shadow-md);
      animation: fadeUp .4s .08s ease both; opacity: 0;
    }
    .add-block.empty-hero {
      background: linear-gradient(135deg, #EFF6FF 0%, #FFFFFF 60%);
      border: 1.5px solid var(--c-blue-line);
    }
    .add-block-label {
      font-size: 11px; font-weight: 700;
      color: var(--c-blue);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 10px;
    }

    /* Number stepper input */
    .num-row {
      display: flex; align-items: center; gap: 10px;
    }
    .num-step {
      width: 48px; height: 56px;
      border-radius: 14px;
      border: 1.5px solid var(--c-line);
      background: #fff;
      cursor: pointer;
      font-family: inherit; font-size: 22px; font-weight: 700;
      color: var(--c-blue);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, border-color .15s;
      flex-shrink: 0;
      padding: 0;
    }
    .num-step:active { transform: scale(.93); border-color: var(--c-blue); }

    .num-input {
      flex: 1; min-width: 0;
      padding: 14px 12px;
      background: #F9FAFB;
      border: 2px solid var(--c-line);
      border-radius: 14px;
      font-family: inherit; font-size: 28px; font-weight: 800;
      color: var(--c-ink); outline: none;
      text-align: center;
      transition: border-color .15s, box-shadow .15s, background .15s;
      -moz-appearance: textfield;
    }
    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    .num-input:focus {
      border-color: var(--c-blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
    }

    .add-btn {
      width: 100%;
      margin-top: 14px;
      padding: 16px;
      background: var(--c-blue);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-glow);
      transition: transform .15s, opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .add-btn:active { transform: scale(.975); }
    .add-btn svg { width: 18px; height: 18px; }

    .aisle-card {
      background: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: var(--shadow-md);
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      text-decoration: none; color: inherit;
      transition: transform .15s;
      position: relative; overflow: hidden;
    }
    .aisle-card::before {
      content:''; position: absolute; left:0; top:0; bottom:0;
      width: 4px; background: var(--c-blue);
    }
    .aisle-card.skipped::before { background: var(--c-muted-2); }
    .aisle-card.skipped .aisle-num { background: #F3F4F6; color: var(--c-muted-2); }
    .aisle-card:active { transform: scale(.98); }

    /* Completed aisle: green tint, green stripe, green check trailing */
    .aisle-card.is-complete {
      background: var(--c-green-soft);
    }
    .aisle-card.is-complete::before { background: var(--c-green); }
    .aisle-card.is-complete .aisle-num {
      background: rgba(22,163,74,.15);
      color: var(--c-green);
    }

    .aisle-num {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--c-blue-soft);
      color: var(--c-blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800;
      flex-shrink: 0;
    }
    .aisle-info { flex: 1; min-width: 0; }
    .aisle-name {
      font-size: 15px; font-weight: 700;
      color: var(--c-ink);
    }
    .aisle-meta {
      font-size: 12px; color: var(--c-muted);
      margin-top: 3px; font-weight: 500;
    }
    .skipped-tag {
      font-size: 10px; font-weight: 800;
      color: var(--c-muted);
      text-transform: uppercase; letter-spacing: .5px;
      background: #F3F4F6;
      padding: 3px 8px; border-radius: 999px;
      margin-left: 6px;
    }

    .done-btn {
      margin: 18px 20px 0;
      padding: 14px;
      background: var(--c-green);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(22,163,74,.25);
      transition: transform .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      animation: fadeUp .4s .25s ease both; opacity: 0;
    }
    .done-btn:active { transform: scale(.975); }
    .done-btn svg { width: 18px; height: 18px; }

    /* Tappable breadcrumb pill */
    .breadcrumb {
      margin: 0 20px;
      padding: 7px 12px;
      background: var(--c-blue-soft);
      border: 1.5px solid var(--c-blue-line);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: space-between;
      animation: fadeUp .35s ease both;
      text-decoration: none;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
    }
    .breadcrumb:active { transform: scale(.98); border-color: var(--c-blue); }
    .breadcrumb-left {
      display: flex; align-items: center; gap: 6px;
    }
    .breadcrumb-up {
      width: 14px; height: 14px;
      color: var(--c-blue);
      flex-shrink: 0;
    }
    .breadcrumb-label {
      font-size: 11px; font-weight: 700;
      color: var(--c-blue);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .breadcrumb-value {
      font-size: 14px; font-weight: 800;
      color: var(--c-ink);
    }
  </style>
</head>
<body>
<div class="shell">

  <div class="top-bar">
    <a href="mm_zone.html" class="btn-circle" aria-label="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <a href="flow_picker.html" class="btn-home" aria-label="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="avatar" id="avatarEl">AB</div>
  </div>

  <div class="hero">
    <div class="eyebrow" data-i18n="mm_aisle_page_eyebrow">Adding aisles</div>
    <div class="hero-title" id="title"></div>
    <div class="hero-sub" id="sub"></div>
  </div>

  <a href="mm_zone.html" class="breadcrumb" style="margin-top: 12px;">
    <div class="breadcrumb-left">
      <svg class="breadcrumb-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      <span class="breadcrumb-label" data-i18n="mm_aisle_eyebrow">Zone</span>
    </div>
    <span class="breadcrumb-value" id="zoneNameEl"></span>
  </a>

  <div class="add-block">
    <div class="add-block-label" data-i18n="mm_aisle_input_label">Numéro d'allée</div>
    <div class="num-row">
      <button class="num-step" id="numDown" type="button" aria-label="-">−</button>
      <input class="num-input" id="numInput" type="number" min="1" inputmode="numeric">
      <button class="num-step" id="numUp" type="button" aria-label="+">+</button>
    </div>
    <button class="add-btn" id="addBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span data-i18n="mm_aisle_add_btn">Configurer cette allée</span>
    </button>
  </div>

  <div class="section-header" id="completedHeader" style="display:none;" data-i18n="mm_aisle_completed">Allées dans cette zone</div>
  <div class="card-list stagger" id="aisleList" style="margin-top: 4px;"></div>

  <button class="done-btn" id="doneBtn" type="button" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span data-i18n="mm_aisle_done_btn">Plus d'allées dans cette zone</span>
  </button>

</div>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';

  const params  = new URLSearchParams(location.search);
  const zoneId  = params.get('zone');
  if (!zoneId) { window.location.href = 'mm_zone.html'; }

  const map = getMap();
  const zone = findZone(map, zoneId);
  if (!zone) { window.location.href = 'mm_zone.html'; }

  document.getElementById('zoneNameEl').textContent = zone.name;

  const titleEl = document.getElementById('title');
  const subEl   = document.getElementById('sub');
  const numInput = document.getElementById('numInput');

  function refresh() {
    const z = findZone(getMap(), zoneId);
    const realAisles = z.aisles.filter(a => !a.skipped);

    const isFirst = realAisles.length === 0;
    titleEl.textContent = isFirst ? t('mm_aisle_title_first') : t('mm_aisle_title_next');
    subEl.textContent   = isFirst ? t('mm_aisle_sub_first')   : t('mm_aisle_sub_next');

    // Set the number input to the next sequential number
    numInput.value = nextAisleNumber(zoneId);

    // Render completed list
    const list = document.getElementById('aisleList');
    const header = document.getElementById('completedHeader');
    const doneBtn = document.getElementById('doneBtn');

    list.innerHTML = '';
    if (z.aisles.length) {
      header.style.display = 'block';
      doneBtn.style.display = 'flex';
      z.aisles.forEach(a => {
        const realSecs = a.sections.filter(s => !s.skipped).length;
        const word = realSecs === 1 ? t('mm_aisle_section') : t('mm_aisle_sections');
        const isComplete = !!a.completed && !a.skipped;

        const card = document.createElement('a');
        let cls = 'aisle-card';
        if (a.skipped) cls += ' skipped';
        if (isComplete) cls += ' is-complete';
        card.className = cls;
        card.href = a.skipped ? '#' : `mm_section.html?zone=${zoneId}&aisle=${a.id}`;
        if (a.skipped) card.addEventListener('click', e => e.preventDefault());

        let trailing = '';
        if (a.skipped) {
          trailing = '';
        } else if (isComplete) {
          trailing = '<div class="card-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>';
        } else {
          trailing = '<div class="zone-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>';
        }

        card.innerHTML = `
          <div class="aisle-num">${a.number}</div>
          <div class="aisle-info">
            <div class="aisle-name">${t('mm_aisle_card_label')} ${a.number} ${a.skipped ? '<span class="skipped-tag">'+t('mm_aisle_skipped')+'</span>' : ''}</div>
            ${a.skipped ? '' : `<div class="aisle-meta">${realSecs} ${word}</div>`}
          </div>
          ${trailing}
        `;
        list.appendChild(card);
      });
    } else {
      header.style.display = 'none';
      doneBtn.style.display = 'none';
    }
  }

  // Number steppers
  document.getElementById('numDown').addEventListener('click', () => {
    const v = Math.max(1, (parseInt(numInput.value, 10) || 1) - 1);
    numInput.value = v;
  });
  document.getElementById('numUp').addEventListener('click', () => {
    const v = Math.max(1, (parseInt(numInput.value, 10) || 0) + 1);
    numInput.value = v;
  });

  // Add aisle: create the aisle, then go to first section setup
  document.getElementById('addBtn').addEventListener('click', () => {
    const n = parseInt(numInput.value, 10);
    if (!n || n < 1) { numInput.focus(); return; }
    const aisle = addAisle(zoneId, n);
    window.location.href = `mm_section.html?zone=${zoneId}&aisle=${aisle.id}`;
  });

  // Done in this zone -> review grid
  document.getElementById('doneBtn').addEventListener('click', () => {
    const z = findZone(getMap(), zoneId);
    if (!z.aisles.length) {
      showToast({ icon: 'warn', message: t('mm_toast_no_aisles'), autoHide: 3000 });
      return;
    }
    window.location.href = `mm_aisle_review.html?zone=${zoneId}`;
  });

  refresh();
</script>
</body>
</html>
