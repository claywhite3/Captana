<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Captana — Réseau</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    .status-card {
      margin: 14px 20px 0;
      background: var(--c-green-soft);
      border: 1.5px solid var(--c-green-line);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow-sm);
      animation: fadeUp .4s .04s ease both; opacity: 0;
    }
    .status-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(22,163,74,.18);
      color: var(--c-green);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .status-icon svg { width: 22px; height: 22px; }
    .status-text { flex: 1; min-width: 0; }
    .status-label {
      font-size: 10px; font-weight: 700;
      color: var(--c-green);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .status-value {
      font-size: 15px; font-weight: 700;
      color: var(--c-ink);
      margin-top: 2px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: 1px;
    }

    .graphic-card {
      margin: 16px 20px 0;
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      animation: fadeUp .4s .12s ease both; opacity: 0;
    }
    .graphic-slot {
      width: 100%;
      min-height: 260px;
      position: relative;
      display: block;
    }
    .graphic-slot .img-fallback-wrap { position: relative; min-height: 260px; }
    .graphic-slot .img-fallback-card  { border-radius: 0; min-height: 260px; }

    .btn-remove {
      width: 100%;
      padding: 16px;
      background: var(--c-amber);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(245,158,11,.30);
      transition: transform .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-remove:active { transform: scale(.975); }
    .btn-remove svg { width: 18px; height: 18px; }

    /* Countdown swap-in. Replaces the button block after "Battery removed" tap.
       Uses a circular progress ring and a large monospace number so the count
       is unambiguous even when it's accelerating to zero. */
    .countdown-card {
      margin: 18px 20px 0;
      padding: 22px;
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      display: flex; align-items: center; gap: 18px;
      animation: fadeUp .3s ease both; opacity: 0;
    }
    .countdown-ring {
      position: relative;
      width: 76px; height: 76px;
      flex-shrink: 0;
    }
    .countdown-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .countdown-ring circle.track { fill: none; stroke: #E5E7EB; stroke-width: 6; }
    .countdown-ring circle.fill  { fill: none; stroke: var(--c-blue); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .2s linear; }
    .countdown-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 22px; font-weight: 800; color: var(--c-ink);
    }
    .countdown-text { flex: 1; }
    .countdown-label {
      font-size: 11px; font-weight: 800;
      color: var(--c-blue);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .countdown-msg {
      font-size: 14px; font-weight: 600;
      color: var(--c-ink);
      margin-top: 4px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
<div class="shell">

  <div class="top-bar">
    <a href="maintenance.html" class="btn-circle" aria-label="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <a href="flow_picker.html" class="btn-home" aria-label="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="avatar" id="avatarEl">AB</div>
  </div>

  <div class="hero">
    <div class="eyebrow" data-i18n="mnr_eyebrow">Dépannage réseau</div>
    <div class="hero-title" id="heroTitle" data-i18n="mnr_title">Retirez la batterie</div>
    <div class="hero-sub" id="heroSub" data-i18n="mnr_sub">Retirez la batterie de la caméra. Attendez environ 20 secondes avant de la remettre.</div>
  </div>

  <div class="status-card">
    <div class="status-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div class="status-text">
      <div class="status-label" data-i18n="mnr_loc_label">Emplacement</div>
      <div class="status-value" id="locationValue">A · 4 · 5</div>
    </div>
  </div>

  <div class="graphic-card">
    <div class="graphic-slot" data-src="battery-insert.png" data-alt="Battery removal guide"></div>
  </div>

  <!-- Footer: button replaced by countdown card after tap -->
  <div class="footer-stack" id="footerStack">
    <button class="btn-remove" id="removedBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i18n="mnr_confirm">Batterie retirée</span>
    </button>
  </div>

</div>

<script src="app.js"></script>
<script>
  translatePage();
  document.getElementById('avatarEl').textContent = sessionStorage.getItem('userInitials') || 'AB';
  mountImageSlots();

  /* Pull location from the active troubleshoot context (maintenance or validation) */
  (function () {
    var ctx = (typeof getActiveTroubleshootContext === 'function') ? getActiveTroubleshootContext() : null;
    var m = (typeof getMap === 'function') ? getMap() : null;
    var locText = '—';
    if (ctx && m) {
      var z = (m.zones || []).find(function (x) { return x.id === ctx.zoneId; });
      if (z) {
        var a = (z.aisles || []).find(function (x) { return x.id === ctx.aisleId; });
        if (a) {
          var s = (a.sections || []).find(function (x) { return x.id === ctx.sectionId; });
          if (s) locText = z.name + ' · ' + a.number + ' · ' + s.number;
        }
      }
    }
    document.getElementById('locationValue').textContent = locText;

    if (ctx && ctx.__source === 'validation') {
      var bb = document.querySelector('a.btn-circle[href="maintenance.html"]');
      if (bb) bb.setAttribute('href', 'validation.html');
    }
  })();

  /* Accelerating countdown: starts at 20, ticks slowly through the high numbers,
     then accelerates to zero so the demo doesn't actually make the viewer wait
     20 real seconds. Sequence: 20→19→18→17 at ~700ms each, then a fast tail
     that ramps from ~250ms down to ~40ms per tick. Total ~5.5s. */
  function startCountdown() {
    /* Replace the button with the countdown card */
    var stack = document.getElementById('footerStack');
    stack.innerHTML = `
      <div class="countdown-card">
        <div class="countdown-ring">
          <svg viewBox="0 0 76 76">
            <circle class="track" cx="38" cy="38" r="33"/>
            <circle class="fill"  cx="38" cy="38" r="33" id="ringFill"
                    stroke-dasharray="207.3" stroke-dashoffset="0"/>
          </svg>
          <div class="countdown-num" id="countNum">20</div>
        </div>
        <div class="countdown-text">
          <div class="countdown-label" data-i18n="mnr_count_label">Attente du redémarrage</div>
          <div class="countdown-msg"   data-i18n="mnr_count_msg">Laissez la batterie hors de la caméra…</div>
        </div>
      </div>
    `;
    translatePage();

    /* Per-tick delay schedule. Slow start, accelerating to almost-instant by the end. */
    var schedule = [
      700, 700, 700, 600,            // 20 → 16
      500, 420, 350, 290, 240,        // 15 → 11
      200, 170, 140, 115, 95,         // 10 → 6
      80, 65, 55, 45, 40, 40          // 5 → 0
    ];
    var n = 20;
    var ringFill = document.getElementById('ringFill');
    var numEl    = document.getElementById('countNum');
    var circumference = 207.3; // 2π × 33

    function tick() {
      n -= 1;
      numEl.textContent = String(n);
      ringFill.setAttribute('stroke-dashoffset', String(circumference * (1 - n / 20)));
      if (n <= 0) {
        /* Auto-advance — maintenanceContext stays so install_v_nfc picks it up */
        setTimeout(function () {
          window.location.href = 'install_v_nfc.html';
        }, 350);
        return;
      }
      setTimeout(tick, schedule[20 - n] || 40);
    }
    setTimeout(tick, schedule[0]);
  }

  document.getElementById('removedBtn').addEventListener('click', startCountdown);
</script>
</body>
</html>
